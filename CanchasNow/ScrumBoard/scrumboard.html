<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrum Board</title>
  <link rel="stylesheet" href="./scrumboard.css">
</head>
<body>
  <h1>Scrum Board</h1>

  <!-- Form for to create new tasks -->
  <form id="taskForm">
    <input type="text" id="taskText" placeholder="Task" required>
    <input type="text" id="taskAssigned" placeholder="Responsible" required>
    <select id="taskColor">
      <option value="--yellow">Yellow</option>
      <option value="--purple">Purple</option>
      <option value="--blue">Blue</option>
      <option value="--green">Green</option>
      <option value="--pink">Pink</option>
      <option value="--orange">Orange</option>
    </select>
    <select id="taskColumn"></select>
    <button type="submit">➕ Add</button>
  </form>

  <div class="board" id="board"></div>

  <script type="module" src="./scrumboard.js"></script>
</body>
</html>
